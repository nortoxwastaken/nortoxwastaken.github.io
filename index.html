<!DOCTYPE html>
<html>
<head>
    <title>Hex Converter</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 20px; text-align: center; }
        #out { width: 100%; height: 300px; background: #000; color: #0f0; font-family: monospace; border: 1px solid #444; }
        #status { color: #f1c40f; margin: 10px; font-weight: bold; font-size: 1.2em; }
        .box { background: #222; padding: 20px; border-radius: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Roblox Video Converter (128x128)</h1>
    <div class="box">
        <input type="file" id="upload" accept="video/mp4,video/webm">
        <button type="button" onclick="process()">Convert to 8192 Pixels</button>
    </div>
    
    <div id="status">Ready</div>
    <textarea id="out" placeholder="Data will appear here..."></textarea>
    
    <canvas id="c" width="9126" height="9126" style="display:none"></canvas>
    <video id="v" style="display:none"></video>

    <script>
        async function process() {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            const out = document.getElementById('out');
            const status = document.getElementById('status');
            const file = document.getElementById('upload').files[0];

            if (!file) return alert("Please select a video file!");

            const ctx = c.getContext('2d', { willReadFrequently: true });
            v.src = URL.createObjectURL(file);
            status.innerText = "Loading video...";

            await new Promise(res => v.onloadedmetadata = res);
            
            let allFrames = [];
            const duration = v.duration;
            const res = 96; // Hardcoded resolution

            // Step 0.2 means 5 frames per second. 
            // Increase to 0.5 if the output text is too long for Roblox.
for(let t=0; t < duration; t += 0.2) {
    v.currentTime = t;
    await new Promise(res => v.onseeked = res);
    
    ctx.drawImage(v, 0, 0, res, res);
    const data = ctx.getImageData(0, 0, res, res).data;
    
    let frameString = "";
    for(let i=0; i < data.length; i += 4) {
        const r = data[i].toString(16).padStart(2, '0');
        const g = data[i+1].toString(16).padStart(2, '0');
        const b = data[i+2].toString(16).padStart(2, '0');
        
        const hex = r + g + b;
        
        // COMPRESSION: If black, use a dot. Otherwise, use the 6-char hex.
        if (hex === "000000") {
            frameString += ".";
        } else {
            frameString += hex;
        }
    }
    allFrames.push(frameString);
                
                status.innerText = `Processing: ${Math.floor((t/duration)*100)}% (${allFrames.length} frames)`;
            }

            out.value = allFrames.join("|");
            status.innerText = "Done! Copy the text above.";
        }
    </script>
</body>
</html>
