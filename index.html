<!DOCTYPE html>
<html>
<head>
    <title>Hex Converter - Low Memory</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; padding: 20px; text-align: center; }
        #out { width: 100%; height: 300px; background: #000; color: #0f0; font-family: monospace; border: 1px solid #444; margin-top: 10px; }
        #status { color: #f1c40f; margin: 10px; font-weight: bold; font-size: 1.2em; }
        .box { background: #222; padding: 20px; border-radius: 10px; display: inline-block; }
        #copy-notice { color: #2ecc71; font-weight: bold; display: none; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>Roblox Video Converter (Low Memory Version)</h1>
    <div class="box">
        <input type="file" id="upload" accept="video/mp4,video/webm">
        <button type="button" onclick="process()">Convert & Stream</button>
    </div>
    
    <div id="status">Ready</div>
    <div id="copy-notice">Result copied to clipboard!</div>
    <textarea id="out" placeholder="Data will appear here..."></textarea>
    
    <canvas id="c" width="96" height="96" style="display:none"></canvas>
    <video id="v" style="display:none"></video>

    <script>
        async function process() {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            const out = document.getElementById('out');
            const status = document.getElementById('status');
            const copyNotice = document.getElementById('copy-notice');
            const file = document.getElementById('upload').files[0];

            if (!file) return alert("Please select a video file!");

            out.value = "PX:"; // Start the string
            copyNotice.style.display = "none";
            const ctx = c.getContext('2d', { willReadFrequently: true });
            v.src = URL.createObjectURL(file);
            status.innerText = "Initializing Stream...";

            await new Promise(res => v.onloadedmetadata = res);
            
            const duration = v.duration;
            const res = 96;

            function compressFrame(pixels) {
                let compressed = [];
                let runColor = pixels[0];
                let runCount = 0;
                for (let i = 0; i <= pixels.length; i++) {
                    if (i < pixels.length && pixels[i] === runColor) {
                        runCount++;
                    } else {
                        compressed.push(`${runCount}#${runColor}`);
                        if (i < pixels.length) {
                            runColor = pixels[i];
                            runCount = 1;
                        }
                    }
                }
                return compressed.join(",");
            }

            for(let t=0; t < duration; t += 0.1) {
                v.currentTime = t;
                await new Promise(res => v.onseeked = res);
                
                ctx.drawImage(v, 0, 0, res, res);
                const data = ctx.getImageData(0, 0, res, res).data;
                
                let pixelArray = [];
                for(let i=0; i < data.length; i += 4) {
                    const r = data[i].toString(16).padStart(2, '0');
                    const g = data[i+1].toString(16).padStart(2, '0');
                    const b = data[i+2].toString(16).padStart(2, '0');
                    const hex = r + g + b;
                    pixelArray.push(hex === "000000" ? "." : hex);
                }
                
                // Append directly to the textarea instead of an array
                const frameData = compressFrame(pixelArray);
                out.value += (t === 0 ? "" : "|") + frameData;
                
                status.innerText = `Streaming: ${Math.floor((t/duration)*100)}%`;
                
                // Force a small break to let the browser clear garbage collection
                if (Math.floor(t * 10) % 50 === 0) await new Promise(r => setTimeout(r, 10));
            }

            status.innerText = "Done!";

            try {
                await navigator.clipboard.writeText(out.value);
                copyNotice.style.display = "block";
            } catch (err) {
                status.innerText = "Done! (Manual copy required)";
            }
        }
    </script>
</body>
</html>
